[profile.default]
solc = "0.8.35"
src = "src"
out = "out"
libs = ["lib"]
via-ir = true
optimizer = true
optimizer_runs = 150
evm_version = "prague"
fs_permissions = [{ access = "read-write", path = "./deployments/"}]
block_gas_limit = 10000000000
ignored_error_codes = ["unreachable", "transient-storage"]
ignored_warnings_from = ["test", "lib"]

[profile.exhaustive]
ffi = true

[fmt]
bracket_spacing = false
int_types = "long"
line_length = 120
multiline_func_header = "params_first"
quote_style = "double"
tab_width = 4
wrap_comments = true

[lint]
exclude_lints = ["mixed-case-variable", "unaliased-plain-import", "mixed-case-function", "screaming-snake-case-immutable", "erc20-unchecked-transfer", "asm-keccak256", "unwrapped-modifier-logic", "unsafe-typecast", "pascal-case-struct", "unsafe-cheatcode", "block-timestamp"]
